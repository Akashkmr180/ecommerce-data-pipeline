version: "3.9"

services:

  # ── Main pipeline container ──────────────────────────────────────────────────
  pipeline-app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: pipeline-app
    volumes:
      - ./data:/app/data          # persist generated data on host
    environment:
      - PYTHONUNBUFFERED=1
      - PYSPARK_PYTHON=python3
    command: tail -f /dev/null    # keep alive for exec commands

  # ── Airflow (single-container standalone mode) ────────────────────────────────
  airflow:
    image: apache/airflow:2.8.1-python3.11
    container_name: pipeline-airflow
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__WEBSERVER__SECRET_KEY=supersecretkey
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=sqlite:////opt/airflow/airflow.db
      - _AIRFLOW_DB_MIGRATE=true
      - _AIRFLOW_WWW_USER_CREATE=true
      - _AIRFLOW_WWW_USER_USERNAME=admin
      - _AIRFLOW_WWW_USER_PASSWORD=admin
    volumes:
      - ./orchestration:/opt/airflow/dags
      - ./data:/app/data
    ports:
      - "8080:8080"
    command: standalone
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
